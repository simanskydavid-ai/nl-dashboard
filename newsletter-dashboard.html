<!DOCTYPE html><html lang="cs"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Newsletter Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes float1{0%,100%{transform:translateY(0px)}50%{transform:translateY(-12px)}}
@keyframes float2{0%,100%{transform:translateY(0px)}50%{transform:translateY(-8px)}}
@keyframes blink{0%,100%{opacity:.82}50%{opacity:1}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#0d001f;
  display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;position:relative;overflow:hidden}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:radial-gradient(circle,#1e0848 0%,#1a0640 68%,#0d001f 69%);
  background-size:122px 122px;
  animation:blink 3.5s ease-in-out infinite;
}
body::after{
  content:'';position:fixed;bottom:0;left:0;right:0;height:48%;z-index:0;
  background:linear-gradient(to bottom,transparent,#0d001f);
}
.fade{position:fixed;bottom:0;left:0;right:0;height:50%;z-index:0;background:linear-gradient(to bottom,transparent,#0c0020);pointer-events:none}
.logo-tp{position:fixed;top:36px;left:44px;z-index:2;animation:float1 5s ease-in-out infinite;opacity:.9}
.logo-plg{position:fixed;top:36px;right:44px;z-index:2;animation:float2 6s ease-in-out infinite .8s;opacity:.9}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:16px;animation:fadeIn .8s ease-out}
input{padding:12px 20px;border-radius:8px;border:2px solid rgba(255,255,255,.25);background:rgba(10,0,30,.7);color:#fff;font-size:16px;width:260px;outline:none;text-align:center;backdrop-filter:blur(12px)}
input:focus{border-color:rgba(255,255,255,.6)}
button{background:#fff;color:#0c0020;border:none;border-radius:8px;padding:10px 32px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s}
button:hover{opacity:.85}
.err{color:#ff6b6b;font-size:13px;display:none}
</style></head>
<body>
<div class="fade"></div>
<div class="logo-tp">
  <svg width="160" height="36" viewBox="0 0 160 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <text x="0" y="28" font-family="Georgia,serif" font-size="28" font-weight="700" fill="white" opacity="0.85" letter-spacing="-1">ticketportal</text>
  </svg>
</div>
<div class="logo-plg">
  <svg width="96" height="36" viewBox="0 0 96 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="14" cy="18" r="14" fill="#ff80e3"/>
    <text x="14" y="23" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="800" fill="#0c0020">P</text>
    <circle cx="48" cy="18" r="14" fill="#06d473"/>
    <text x="48" y="23" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="800" fill="#0c0020">L</text>
    <circle cx="82" cy="18" r="14" fill="rgba(255,255,255,0.25)"/>
    <text x="82" y="23" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="800" fill="white">G</text>
  </svg>
</div>
<div class="wrap">
<input id="pw" type="password" placeholder="Heslo" autofocus onkeydown="if(event.key==='Enter')unlock()">
<button onclick="unlock()">Vstoupit</button>
<div class="err" id="err">Špatné heslo</div>
</div>
