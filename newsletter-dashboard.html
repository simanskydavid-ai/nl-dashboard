<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Newsletter Intelligence Vault</title>
<style>
:root{
--bg:#11002d;--bg2:#1a1033;
--panel:rgba(24,11,44,.78);--line:rgba(255,255,255,.1);--text:#fff;
--muted:#d8d1e4;--muted2:#ab9fbd;--pink:#ff80e3;--green:#06d473;
--shadow:0 30px 90px rgba(7,0,18,.48);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%}
body{
font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:var(--bg);color:var(--text);
display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;
}
.orb{position:absolute;border-radius:999px;filter:blur(12px);opacity:.55;animation:drift 12s ease-in-out infinite;pointer-events:none}
.orb1{width:180px;height:180px;top:12%;left:11%;background:radial-gradient(circle,rgba(103,92,121,.48),transparent 72%)}
.orb2{width:240px;height:240px;right:8%;bottom:10%;animation-delay:-4s;background:radial-gradient(circle,rgba(219,215,226,.18),transparent 72%)}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(18px,-22px)}}
main{
position:relative;z-index:1;display:flex;gap:56px;align-items:center;
max-width:920px;width:100%;padding:40px 24px;
}
.gate{
background:var(--panel);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
border:1px solid var(--line);border-radius:24px;padding:48px 44px;
box-shadow:var(--shadow);min-width:380px;
}
.gate h1{font-size:1.45rem;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.gate .sub{color:var(--muted2);font-size:.88rem;margin-bottom:32px}
label{display:block;font-size:.78rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.pw-wrap{position:relative;margin-bottom:20px}
input[type=password]{
width:100%;padding:13px 42px 13px 16px;background:rgba(255,255,255,.07);
border:1px solid var(--line);border-radius:10px;color:#fff;font-size:.97rem;outline:none;
transition:border-color .2s;
}
input[type=password]:focus{border-color:rgba(255,128,227,.55);}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:var(--muted2);}
.err{display:none;background:rgba(255,60,60,.12);border:1px solid rgba(255,60,60,.35);border-radius:8px;padding:10px 14px;font-size:.85rem;color:#ff8080;margin-bottom:16px}
.btn{
width:100%;padding:14px;border:none;border-radius:10px;
background:linear-gradient(135deg,#7c3aed,#a855f7);
color:#fff;font-size:.97rem;font-weight:600;cursor:pointer;
transition:opacity .2s,transform .1s;
}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.98)}
.hero{flex:1;min-width:0}
.hero h2{font-size:2rem;font-weight:800;line-height:1.2;letter-spacing:-.03em;margin-bottom:14px}
.hero h2 span{background:linear-gradient(90deg,#ff80e3,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--muted);font-size:.95rem;line-height:1.6;margin-bottom:28px}
.rail{display:flex;flex-direction:column;gap:10px}
.rail-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(255,255,255,.04);border-radius:8px;font-size:.84rem}
.rail-item span{color:var(--muted2)}
.rail-item strong{color:var(--green)}
@media(max-width:680px){main{flex-direction:column-reverse;gap:32px}.gate{min-width:unset}}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<main>
  <aside class="hero">
    <h2>Newsletter<br><span>Intelligence</span><br>Dashboard</h2>
    <p>Přehled výkonu newsletterů — chráněný end-to-end šifrováním přímo v prohlížeči.</p>
    <div class="rail">
      <div class="rail-item"><span>Encryption</span><strong>AES-256-GCM</strong></div>
      <div class="rail-item"><span>Key derivation</span><strong>PBKDF2 · 100k iterations</strong></div>
      <div class="rail-item"><span>Session</span><strong>Client-side only</strong></div>
    </div>
  </aside>
  <div class="gate">
    <h1>🔒 Vault Access</h1>
    <p class="sub">Zadej přístupovou frázi pro dešifrování.</p>
    <label for="pw">Přístupová fráze</label>
    <div class="pw-wrap">
      <input type="password" id="pw" placeholder="••••••••••••••" autocomplete="current-password">
      <button class="eye" onclick="var i=document.getElementById('pw');i.type=i.type==='password'?'text':'password'">👁</button>
    </div>
    <div class="err" id="err">Špatná fráze — zkus to znovu.</div>
    <button class="btn" id="btn" onclick="unlock()">Unlock intelligence</button>
  </div>
</main>

function _reset(){clearTimeout(_t);_t=setTimeout(function(){top.location.reload();},1200000);}
async function unlock(){
  var pw=document.getElementById("pw").value;
  try{
    var raw=atob(PAYLOAD);
    var bytes=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
