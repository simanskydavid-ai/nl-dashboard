<!DOCTYPE html><html lang="cs"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Newsletter Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#09001c;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;position:relative;overflow:hidden}
canvas{position:fixed;inset:0;z-index:0}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:16px;animation:fadeIn .8s ease-out}
.title{color:#06d473;font-size:13px;letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:8px}
input{padding:12px 20px;border-radius:8px;border:2px solid #06d473;background:rgba(10,0,30,.8);color:#fff;font-size:16px;width:260px;outline:none;text-align:center;backdrop-filter:blur(8px)}
input:focus{border-color:#06d473;box-shadow:0 0 0 3px rgba(6,212,115,.15)}
button{background:#06d473;color:#0a0018;border:none;border-radius:8px;padding:10px 32px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s}
button:hover{opacity:.85}
.err{color:#ff4444;font-size:13px;display:none}
</style></head>

<canvas id="cv"></canvas>
<script>
(function(){
  var cv=document.getElementById('cv');
  var ctx=cv.getContext('2d');
  var dots=[];
  function resize(){
    cv.width=window.innerWidth;cv.height=window.innerHeight;
    dots=[];var r=54,gap=8,sp=r*2+gap;
    for(var x=r;x<cv.width+sp;x+=sp)
      for(var y=r;y<cv.height+sp;y+=sp)
        dots.push({x:x,y:y,r:r,phase:Math.random()*Math.PI*2,speed:.4+Math.random()*.5});
  }
  resize();window.addEventListener('resize',resize);
  function draw(){
    ctx.fillStyle='#09001c';ctx.fillRect(0,0,cv.width,cv.height);
    var t=Date.now()/1000;
    dots.forEach(function(d){
      var f=.75+.25*(.5+.5*Math.sin(t*d.speed+d.phase));
      var g=ctx.createRadialGradient(d.x,d.y,0,d.x,d.y,d.r);
      g.addColorStop(0,'rgba(52,28,100,'+(f*.55)+')');
      g.addColorStop(.7,'rgba(38,18,80,'+(f*.40)+')');
      g.addColorStop(1,'rgba(9,0,28,0)');
      ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
    });
    var fg=ctx.createLinearGradient(0,cv.height*.45,0,cv.height);
    fg.addColorStop(0,'rgba(9,0,28,0)');fg.addColorStop(1,'rgba(9,0,28,.95)');
    ctx.fillStyle=fg;ctx.fillRect(0,0,cv.width,cv.height);
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

async function unlock(){
  var pw=document.getElementById("pw").value;
  try{
    var raw=atob(PAYLOAD);
    var bytes=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
    var salt=bytes.slice(0,16),iv=bytes.slice(16,28),ct=bytes.slice(28);
    var keyMat=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
    var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:100000,hash:"SHA-256"},keyMat,{name:"AES-GCM",length:256},false,["decrypt"]);
    var dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);
    var html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById("err").style.display="block";
    document.getElementById("pw").value="";
  }
}
