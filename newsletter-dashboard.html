<!DOCTYPE html><html lang="cs"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Newsletter Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes purpleBlink{0%,100%{opacity:0.62}50%{opacity:0.92}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(to bottom,#241046 0%,#1a0630 45%,#150023 100%);
  display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;position:relative;overflow:hidden}
.dots{position:fixed;top:-1px;left:50%;transform:translateX(-50%);
  width:max(1200px,100%);
  display:grid;grid-template-columns:repeat(10,1fr);grid-auto-rows:120px;gap:0;
  z-index:1;pointer-events:none}
.dot{width:130px;height:130px;border-radius:50%;
  background:#53356f;opacity:0.72;
  margin:-5px;
  animation:purpleBlink 2.8s ease-in-out infinite}
.dot:nth-child(2n){animation-delay:0.35s}
.dot:nth-child(3n){animation-delay:0.7s}
.fade{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:linear-gradient(to bottom,rgba(24,0,43,0) 0%,rgba(24,0,43,0) 42%,rgba(24,0,43,.35) 60%,rgba(24,0,43,.82) 80%,rgba(24,0,43,1) 100%)}
.wrap{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:16px;animation:fadeIn .8s ease-out}
.title{color:#ff80e3;font-size:13px;letter-spacing:2.5px;text-transform:uppercase;font-weight:600;margin-bottom:4px}
input{padding:13px 20px;border-radius:10px;border:2px solid #ff80e3;background:rgba(10,0,30,.75);color:#fff;font-size:16px;width:280px;outline:none;text-align:center;backdrop-filter:blur(12px)}
input:focus{border-color:#ff80e3;box-shadow:0 0 0 3px rgba(255,128,227,.2)}
button{background:#ff80e3;color:#0c0020;border:none;border-radius:10px;padding:12px 40px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s}
button:hover{opacity:.85}
.err{color:#ff6b6b;font-size:13px;display:none}
</style></head>
